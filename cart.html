<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACKIE — Shopping Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #121212; --gold: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg); color: #fff; padding-top: 120px; }
        header { background: rgba(10,10,10,0.95); padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .logo { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: 4px; color: #fff; text-decoration: none; }
        nav a { color: #aaa; text-decoration: none; margin-left: 30px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        nav a:hover, nav a.active { color: var(--gold); }

        .cart-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .cart-title { font-family: 'Cinzel', serif; font-size: 28px; text-align: center; margin-bottom: 40px; letter-spacing: 3px; }
        
        .cart-item { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid #222; padding: 20px; margin-bottom: 15px; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; }
        .item-details { flex: 1; margin-left: 20px; }
        .item-name { font-size: 16px; margin-bottom: 5px; }
        .item-price { color: var(--gold); font-size: 14px; }
        
        .remove-btn { background: transparent; color: #ff5c5c; border: none; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        
        .total-box { border-top: 1px solid #222; padding-top: 20px; margin-top: 30px; text-align: right; }
        .total-text { font-size: 20px; letter-spacing: 1px; margin-bottom: 20px; }
        .checkout-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .checkout-btn:hover { background: #fff; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">BLACKIE</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html" class="active">Cart</a>
            <a href="admin.html">Dashboard</a>
        </nav>
    </header>

    <div class="cart-container">
        <h2 class="cart-title">YOUR LUXURY BAG</h2>
        <div id="cartList"></div>
        <div class="total-box">
            <div class="total-text">TOTAL: <span id="cartTotal" style="color: var(--gold);">0 LKR</span></div>
            <button class="checkout-btn" onclick="checkoutOrder()">Proceed To Checkout</button>
        </div>
    </div>

    <script>
        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('blackie_cart')) || [];
            let list = document.getElementById('cartList');
            let totalBox = document.getElementById('cartTotal');
            list.innerHTML = "";
            
            if(cart.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#555; padding: 40px 0;'>Your luxury cart is empty.</p>";
                totalBox.innerText = "0 LKR";
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                total += parseInt(item.price);
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">${item.price} LKR</div>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>`;
            });
            totalBox.innerText = total.toLocaleString() + " LKR";
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('blackie_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('blackie_cart', JSON.stringify(cart));
            renderCart();
        }

        function checkoutOrder() {
            alert("Order Registered Systematically! Thank you for shopping with BLACKIE Luxury.");
            localStorage.removeItem('blackie_cart');
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
